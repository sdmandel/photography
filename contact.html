<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Steve Mandella Photography</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #fff;
      color: #222;
    }

    /* ── Nav ─────────────────────────────────────────────────── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 100;
    }
    nav .logo {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      text-decoration: none;
      color: #222;
    }
    nav .links { display: flex; gap: 1.5rem; align-items: center; }
    nav .links a {
      font-size: .85rem;
      text-decoration: none;
      color: #555;
      letter-spacing: .03em;
      transition: color .2s;
    }
    nav .links a:hover { color: #000; }

    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
    .hamburger span {
      display: block; width: 22px; height: 2px; background: #222;
      margin: 5px 0; transition: .3s;
    }

    /* ── Form ────────────────────────────────────────────────── */
    .contact-container {
      max-width: 520px;
      margin: 4rem auto;
      padding: 0 2rem;
    }
    .contact-container h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: .5rem;
    }
    .contact-container p {
      color: #777;
      font-size: .9rem;
      margin-bottom: 2rem;
    }
    label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .03em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: .35rem;
    }
    input, textarea {
      width: 100%;
      padding: .7rem .85rem;
      font-size: .95rem;
      font-family: inherit;
      border: 1px solid #ddd;
      border-radius: 3px;
      margin-bottom: 1.25rem;
      transition: border-color .2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #222;
    }
    textarea { resize: vertical; min-height: 140px; }
    button[type="submit"] {
      background: #222;
      color: #fff;
      border: none;
      padding: .75rem 2rem;
      font-size: .9rem;
      font-family: inherit;
      letter-spacing: .03em;
      border-radius: 3px;
      cursor: pointer;
      transition: background .2s;
    }
    button[type="submit"]:hover { background: #444; }

    /* ── Footer ──────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      border-top: 1px solid #eee;
      font-size: .8rem;
      color: #999;
      margin-top: 4rem;
    }
    footer a { color: #555; text-decoration: none; }
    footer a:hover { color: #000; }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 600px) {
      nav .links { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0; background: #fff; border-bottom: 1px solid #eee; padding: 1rem 2rem; gap: .75rem; }
      nav .links.open { display: flex; }
      .hamburger { display: block; }
      .contact-container { margin: 2rem auto; }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav>
    <a href="index.html" class="logo">Steve Mandella</a>
    <button class="hamburger" aria-label="Menu" onclick="document.querySelector('.links').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <div class="links">
      <a href="index.html">Portfolio</a>
      <a href="clients.html">Clients</a>
      <a href="contact.html">Contact</a>
      <a href="https://www.darkroom.com" target="_blank" rel="noopener">Prints</a>
    </div>
  </nav>

  <!-- Contact Form -->
  <div class="contact-container">
    <h1>Get in Touch</h1>
    <p>Interested in working together? Fill out the form below.</p>

    <!--
      FORMSPREE SETUP:
      1. Sign up free at https://formspree.io
      2. Create a new form and copy your form ID (e.g. xyzabcde)
      3. Replace YOUR_FORM_ID below with your actual ID
    -->
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Steve Mandella</p>
  </footer>

</body>
</html>
