<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steve Mandella Photography</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #fff;
      color: #222;
    }

    /* ── Nav ─────────────────────────────────────────────────── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 100;
    }
    nav .logo {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      text-decoration: none;
      color: #222;
    }
    nav .links { display: flex; gap: 1.5rem; align-items: center; }
    nav .links a {
      font-size: .85rem;
      text-decoration: none;
      color: #555;
      letter-spacing: .03em;
      transition: color .2s;
    }
    nav .links a:hover { color: #000; }

    /* ── Hamburger (mobile) ──────────────────────────────────── */
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
    .hamburger span {
      display: block; width: 22px; height: 2px; background: #222;
      margin: 5px 0; transition: .3s;
    }

    /* ── Masonry grid ────────────────────────────────────────── */
    .grid {
      column-count: 3;
      column-gap: 12px;
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }
    .grid-item {
      break-inside: avoid;
      margin-bottom: 12px;
      overflow: hidden;
      border-radius: 2px;
    }
    .grid-item img {
      width: 100%;
      display: block;
      transition: transform .4s ease, filter .4s ease;
    }
    .grid-item img:hover {
      transform: scale(1.02);
      filter: brightness(1.05);
    }

    /* ── Lightbox ────────────────────────────────────────────── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 200;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 2px;
    }

    /* ── Footer ──────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      border-top: 1px solid #eee;
      font-size: .8rem;
      color: #999;
    }
    footer a { color: #555; text-decoration: none; }
    footer a:hover { color: #000; }
    .instagram-icon {
      display: inline-block;
      width: 20px;
      height: 20px;
      vertical-align: middle;
      margin-right: 4px;
    }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 900px) {
      .grid { column-count: 2; padding: 1rem; }
    }
    @media (max-width: 600px) {
      .grid { column-count: 1; padding: .75rem; }
      nav .links { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0; background: #fff; border-bottom: 1px solid #eee; padding: 1rem 2rem; gap: .75rem; }
      nav .links.open { display: flex; }
      .hamburger { display: block; }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav>
    <a href="index.html" class="logo">Steve Mandella</a>
    <button class="hamburger" aria-label="Menu" onclick="document.querySelector('.links').classList.toggle('open')">

  <!-- Lightbox JS -->
  <script>
    document.querySelectorAll('.grid-item img').forEach(img => {
      img.style.cursor = 'zoom-in';
      img.addEventListener('click', () => {
        const lb = document.querySelector('.lightbox');
        lb.querySelector('img').src = img.src;
        lb.classList.add('active');
      });
    });
  </script>
