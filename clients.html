<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Galleries — Steve Mandella Photography</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #fff;
      color: #222;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 100;
    }
    nav .logo {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      text-decoration: none;
      color: #222;
    }
    nav .links { display: flex; gap: 1.5rem; align-items: center; }
    nav .links a {
      font-size: .85rem;
      text-decoration: none;
      color: #555;
      letter-spacing: .03em;
      transition: color .2s;
    }
    nav .links a:hover { color: #000; }

    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
    .hamburger span {
      display: block; width: 22px; height: 2px; background: #222;
      margin: 5px 0; transition: .3s;
    }

    .clients-container {
      max-width: 520px;
      margin: 6rem auto;
      padding: 0 2rem;
      text-align: center;
    }
    .clients-container h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .clients-container p {
      color: #777;
      font-size: .95rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .clients-container .cta {
      display: inline-block;
      background: #222;
      color: #fff;
      text-decoration: none;
      padding: .75rem 2rem;
      font-size: .9rem;
      letter-spacing: .03em;
      border-radius: 3px;
      transition: background .2s;
    }
    .clients-container .cta:hover { background: #444; }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      border-top: 1px solid #eee;
      font-size: .8rem;
      color: #999;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
    }
    footer a { color: #555; text-decoration: none; }
    footer a:hover { color: #000; }

    @media (max-width: 600px) {
      nav .links { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0; background: #fff; border-bottom: 1px solid #eee; padding: 1rem 2rem; gap: .75rem; }
      nav .links.open { display: flex; }
      .hamburger { display: block; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">Steve Mandella</a>
    <button class="hamburger" aria-label="Menu" onclick="document.querySelector('.links').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <div class="links">
      <a href="index.html">Portfolio</a>
      <a href="clients.html">Clients</a>
      <a href="contact.html">Contact</a>
      <a href="https://www.darkroom.com" target="_blank" rel="noopener">Prints</a>
    </div>
  </nav>

  <div class="clients-container">
    <h1>Client Galleries</h1>
    <p>Your photos are delivered through a private, password-protected gallery. Click below to access your images.</p>
    <!-- Replace with your actual Pixieset URL -->
    <a class="cta" href="https://your-pixieset-url.pixieset.com" target="_blank" rel="noopener">View Your Gallery →</a>
  </div>

  <footer>
    <p>&copy; 2026 Steve Mandella</p>
  </footer>

</body>
</html>
